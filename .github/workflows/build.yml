name: Build Windows App

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: windows-latest  # This spins up a real Windows machine

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install PySide6 pyinstaller
          # Add any other requirements here

      - name: Setup FFmpeg
        uses: FedericoCarboni/setup-ffmpeg@v3
        id: setup-ffmpeg

      - name: Prepare FFmpeg Folder
        run: |
          mkdir ffmpeg
          # Copy the ffmpeg.exe from the Action's path to your local folder
          copy "${{ steps.setup-ffmpeg.outputs.ffmpeg-path }}\ffmpeg.exe" "ffmpeg/ffmpeg.exe"

      - name: Build Executable
        run: |
          pyinstaller --noconsole --onefile --add-data "ffmpeg/ffmpeg.exe;ffmpeg" main.py

      - name: Upload Finished EXE
        uses: actions/upload-artifact@v4
        with:
          name: AudioCompressor-Windows
          path: dist/main.exe
